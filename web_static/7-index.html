<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>AirBnB clone</title>
    <link rel="stylesheet" href="styles/resets.css">
    <link rel="stylesheet" href="styles/4-common.css">
    <link rel="stylesheet" href="styles/3-header.css">
    <link rel="stylesheet" href="styles/3-footer.css">
    <link rel="stylesheet" href="styles/6-filters.css">
    <link rel="stylesheet" href="styles/7-places.css">

    <link rel="icon" href="images/icon.png">
  </head>
  <body>
    <header> </header>
    <div class="container">
      <section class="filters">
        <div class="locations">
          <h3>States</h3><!--
          --><h4>ie. Massachusetts/Rhode Island...</h4>
          <div class="popover">
            <h2>Massachusetts:</h2>
            <ul>
              <li>Boston</li>
              <li>Cambridge</li>
              <li>Worcester</li>
            </ul>
            <h2>Rhode Island:</h2>
            <ul>
              <li>Providence</li>
              <li>Newport</li>
            </ul>
          </div>
        </div>

        <div class="amenities">
          <h3>Amenities</h3>
          <h4>ie. Pool/ Palour...</h4>
          <ul class="popover">
            <li>Internet</li>
            <li>TV</li>
            <li>Kitchen</li>
            <li>Iron</li>
          </ul>
        </div>
        <button>Search</button>
      </section>
      <section class="places">
        <h1>Places</h1>
        <article>
          <h2>My House</h2>
        </article><article>
          <h2>Tiny House</h2>
        </article><article>
          <h2>A Suite</h2>
        </article>
      </section>
    </div>
    <footer>
      Holberton School
    </footer>

</html>
